# Example config file. Copy to ./config.yaml (or /etc/huddle/config.yaml) to use.
# Env vars (HUDDLE_*) override these values.

addr: ":8080"
version: "dev"

database:
  url: "postgres://huddle:huddle@localhost:5432/huddle?sslmode=disable"
  # Pool sizing. Tune per deployment based on Postgres max_connections and
  # the number of API replicas.
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m

valkey:
  url: "redis://localhost:6379"

auth:
  # OIDC issuer — the full URL of the realm, not the realms endpoint.
  issuer_url: "http://localhost:8180/realms/huddle"
  # Required `aud` claim on every access token. Set this per-deployment to
  # the logical identifier of *this* API, not the client that issues tokens.
  audience: "huddle-api"

nats:
  # JetStream URL. The API publishes message events here and streaming
  # subscribers read them back. Future: search/audit/notification consumers.
  url: "nats://localhost:4222"
