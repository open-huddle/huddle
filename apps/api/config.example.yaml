# Example config file. Copy to ./config.yaml (or /etc/huddle/config.yaml) to use.
# Env vars (HUDDLE_*) override these values.

addr: ":8080"
version: "dev"

database:
  url: "postgres://huddle:huddle@localhost:5432/huddle?sslmode=disable"
  # Pool sizing. Tune per deployment based on Postgres max_connections and
  # the number of API replicas.
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m

valkey:
  url: "redis://localhost:6379"

auth:
  # OIDC issuer — the full URL of the realm, not the realms endpoint.
  issuer_url: "http://localhost:8180/realms/huddle"
  # Required `aud` claim on every access token. Set this per-deployment to
  # the logical identifier of *this* API, not the client that issues tokens.
  audience: "huddle-api"

nats:
  # JetStream URL. The API publishes message events here and streaming
  # subscribers read them back. Future: notification consumers.
  url: "nats://localhost:4222"

opensearch:
  # OpenSearch cluster URL. The indexer worker writes message projections
  # here; SearchService queries against the alias below.
  url: "http://localhost:9200"
  # Index alias the service reads from and the indexer writes to. Keep it
  # stable — concrete index names (huddle-messages-v1, -v2, …) are a
  # deployment detail; clients always talk to the alias.
  messages_index: "huddle-messages"

outbox:
  # Retention window for fully-processed outbox rows. A row is eligible
  # for deletion by the outbox GC worker only once all three downstream
  # consumers have stamped their markers (published_at, indexed_at,
  # sibling audit_events row) AND the row is older than this value.
  # Longer values give more room to diagnose a bad publish; shorter
  # values keep the outbox table small.
  retention: 24h

invites:
  # HMAC-SHA256 key used to hash invite tokens at rest. MUST be changed
  # per-deployment; running with the literal default lets anyone with
  # the source tree forge tokens. Generate with e.g. `openssl rand -hex 32`.
  # Rotating this invalidates every outstanding pending invitation.
  secret: "dev-only-invites-secret-change-in-prod"
  # Public URL the invite email points at. The mailer appends
  # ?token=<token>. Typically ends in /accept-invite.
  link_base_url: "http://localhost:5173/accept-invite"
  # How long an invite stays acceptable. Re-inviting resets the clock.
  ttl: 168h  # 7 days

email:
  # "log" prints the rendered email to the API log — dev default, no
  # SMTP needed. "smtp" dials the relay below.
  driver: "log"
  from_address: "noreply@open-huddle.local"
  from_name: "Open Huddle"
  smtp:
    host: ""        # required when driver=smtp
    port: 587
    username: ""
    password: ""
    start_tls: true # keep on for anything beyond a dev relay
