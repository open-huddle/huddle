# Debezium Server config — Postgres WAL → NATS JetStream pipeline.
#
# The pipeline shape is:
#   1. Postgres connector tails the `outbox_events` table via pgoutput.
#   2. The Outbox Event Router SMT pulls `subject` out of each row to use
#      as the destination topic, and `payload` as the message value.
#   3. The NATS JetStream sink publishes each event to NATS with the
#      subject = the row's stored subject (e.g. huddle.messages.created.<id>).
#
# Subscribers downstream (MessageService.Subscribe) decode the value with
# proto.Unmarshal, exactly the same as today — the wire format does not
# change. What changes is who writes to NATS: today the in-process
# outbox.Publisher; once Slice B flips the driver, only Debezium.

# ----- Source: PostgresConnector via pgoutput ----------------------------
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=1000

debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=debezium
debezium.source.database.password=debezium
debezium.source.database.dbname=huddle

# pgoutput is built into Postgres 10+; no decoder plugin to install. The
# publication is auto-created and filtered to only the table we capture
# (so an INSERT into messages doesn't show up here — only outbox rows do).
debezium.source.plugin.name=pgoutput
debezium.source.publication.autocreate.mode=filtered
debezium.source.table.include.list=public.outbox_events

# Topic prefix is required by Debezium even though the Outbox Event Router
# overwrites the topic per-row. Pick a value that won't collide with any
# real NATS subject if a row ever escapes the SMT.
debezium.source.topic.prefix=huddle.cdc

# Replication slot + publication names — explicit so operators can find
# them in pg_replication_slots and pg_publication.
debezium.source.slot.name=huddle_outbox
debezium.source.publication.name=huddle_outbox

# Skip the initial snapshot. outbox_events history is bounded by GC anyway,
# and replaying every existing row to NATS on first start would clobber
# downstream consumers. Only future INSERTs matter for the CDC bridge.
debezium.source.snapshot.mode=never

# ----- Outbox Event Router SMT ------------------------------------------
# Maps our schema to the SMT's expected fields, then routes each event to
# the topic stored in the `subject` column. The SMT also filters out
# anything other than INSERTs so the in-process publisher's UPDATE that
# stamps `published_at` is never re-published.
debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter

debezium.transforms.outbox.table.field.event.id=id
debezium.transforms.outbox.table.field.event.key=aggregate_id
debezium.transforms.outbox.table.field.event.type=event_type
debezium.transforms.outbox.table.field.event.payload=payload
debezium.transforms.outbox.table.field.event.timestamp=created_at

# Use the `subject` column's literal value as the destination topic. NATS
# subjects in this project look like `huddle.messages.created.<channel>`,
# which is exactly what subscribers filter on — no further mapping needed.
debezium.transforms.outbox.route.by.field=subject
debezium.transforms.outbox.route.topic.replacement=${routedByValue}

# ----- Value/key format: raw bytes --------------------------------------
# `binary` makes Debezium emit the payload column's bytes verbatim, with no
# JSON envelope or base64 wrapping. That's what subscribers' proto.Unmarshal
# expects — the same byte-for-byte payload the in-process publisher writes
# today.
debezium.format.value=binary
debezium.format.key=binary

# ----- Sink: NATS JetStream ---------------------------------------------
debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://nats:4222
# The `messages` JetStream stream is created by apps/api at startup with
# subject filter `huddle.messages.>` (see internal/events/nats.go). Don't
# let Debezium auto-create one — we'd end up with two streams competing
# for the same subjects.
debezium.sink.nats-jetstream.create-stream=false
