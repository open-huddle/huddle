# Local dev dependencies only. Full production topology lives in Helm charts.
services:
  postgres:
    # Keep this in lockstep with the dev-diff container in apps/api/scripts/migrate-diff.sh.
    # Both read POSTGRES_IMAGE from the environment (set by the Makefile) so a single
    # bump updates compose + migration diffs together.
    image: ${POSTGRES_IMAGE:-postgres:18.3-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: huddle
      POSTGRES_PASSWORD: huddle
      POSTGRES_DB: huddle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U huddle -d huddle" ]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9.0.3-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  valkey-data:
