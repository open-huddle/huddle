# Local dev dependencies only. Full production topology lives in Helm charts.
services:
  postgres:
    # Keep this in lockstep with the dev-diff container in apps/api/scripts/migrate-diff.sh.
    # Both read POSTGRES_IMAGE from the environment (set by the Makefile) so a single
    # bump updates compose + migration diffs together.
    image: ${POSTGRES_IMAGE:-postgres:18.3-alpine}
    restart: unless-stopped
    # wal_level=logical is required by Debezium's pgoutput plugin (the default
    # `replica` is not enough). max_wal_senders / max_replication_slots are at
    # the Postgres 18 defaults of 10 each, but pinning them here makes the
    # contract visible to operators and survives a default change. The values
    # are harmless when no replication is happening — non-Debezium dev runs
    # are unaffected.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: huddle
      POSTGRES_PASSWORD: huddle
      POSTGRES_DB: huddle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      # Seeds additional databases/roles on first-volume boot (see the SQL
      # files for details). Postgres's init scripts run exactly once per
      # volume, so `make dev-down -v` is needed to re-seed.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U huddle -d huddle" ]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9.0.3-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Persistence — share the Postgres instance with the API, separate DB + role.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Dev-mode HTTP on 8180 so it doesn't collide with the API on 8080.
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      # Dev admin — DO NOT use in any environment that isn't your laptop.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    # `--import-realm` reads every *.json under /opt/keycloak/data/import on
    # startup if the realm does not yet exist. Subsequent starts ignore it.
    command: [ "start-dev", "--import-realm" ]
    ports:
      - "8180:8180"
      - "9000:9000" # management port — carries /health and /metrics in KC 26+
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # KC 26 moved /health off the HTTP port onto the management port (9000)
      # and ships without curl, so we check TCP via bash's /dev/tcp.
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo ok >&3 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  nats:
    image: ${NATS_IMAGE:-nats:2.10-alpine}
    restart: unless-stopped
    # `-js` enables JetStream (persistent streams + consumers); `-sd` points
    # JetStream at the mounted volume so streams survive `docker compose down`
    # without `-v`. The architecture commits to JetStream as the event
    # backbone, so we run it from day one even though Phase 2c only uses
    # ephemeral consumers.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222" # client port
      - "8222:8222" # monitoring (varz/healthz)
    volumes:
      - nats-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz | grep -q ok || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.17.1}
    restart: unless-stopped
    environment:
      # Dev-only single-node mode. The security plugin is off locally so we
      # don't need a demo TLS cert on every laptop — Helm turns it back on in
      # production. Heap is capped below the 1 GiB default to fit on an API
      # developer's machine alongside Postgres + Keycloak + NATS.
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Dev memory lock off — laptops without mlock capability otherwise fail to start.
      bootstrap.memory_lock: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      # The cluster health endpoint returns yellow on single-node (no replicas
      # possible), so we accept yellow-or-green as "ready".
      test: [ "CMD-SHELL", "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # All-in-one observability stack: OpenTelemetry Collector + Tempo + Prometheus
  # + Loki + Grafana, in one container, with Grafana pre-configured to query
  # all three backends. Profile-gated: `make dev-up` does NOT start it; bring
  # it up with `make dev-up-observability`. The image is ~1 GB but the dev
  # story is one container instead of five — ADR-0019 documents the choice.
  #
  # Ports:
  #   - 3000: Grafana UI (anonymous access on; no login in dev).
  #   - 4317: OTLP/gRPC ingest — what the API sends traces and metrics to
  #           when HUDDLE_OBSERVABILITY_ENABLED=true.
  #   - 4318: OTLP/HTTP ingest — alternative for clients that can't speak gRPC.
  #
  # Slice C of ADR-0019 mounts two extras:
  #   - otelcol-config-extras.yaml adds a Prometheus receiver in the
  #     collector that scrapes the postgres- and nats-exporter sidecars
  #     and feeds the metrics into the existing OTLP pipeline.
  #   - grafana-dashboards/ provisions the canned CDC-pipeline dashboard.
  otel-lgtm:
    image: ${OTEL_LGTM_IMAGE:-grafana/otel-lgtm:0.8.1}
    profiles: [ "observability" ]
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - otel-lgtm-data:/data
      - ./observability/otelcol-config-extras.yaml:/otel-lgtm/otelcol-config-extras.yaml:ro
      - ./observability/grafana-dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards:ro
      - ./observability/grafana-dashboards-content:/otel-lgtm/grafana/conf/provisioning/dashboards-content:ro
    healthcheck:
      # Grafana on 3000 is the user-facing surface; if it's up, the bundled
      # backends are wired in.
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\":\"ok\"' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # postgres_exporter publishes Postgres-internal metrics in Prometheus
  # format. Slice C of ADR-0019 uses it for the load-bearing CDC signal:
  # `pg_replication_slots_pg_wal_lsn_diff` (bytes the Debezium slot is
  # behind master). Without this metric, ADR-0018's cutover ("Debezium is
  # the only NATS publisher") is operating blind.
  postgres-exporter:
    image: ${POSTGRES_EXPORTER_IMAGE:-quay.io/prometheuscommunity/postgres-exporter:v0.15.0}
    profiles: [ "observability" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://huddle:huddle@postgres:5432/huddle?sslmode=disable"
    ports:
      - "9187:9187"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:9187/metrics | grep -q '^pg_up ' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # prometheus-nats-exporter scrapes NATS's monitoring port (8222) and
  # republishes the JSON shape as Prometheus metrics. The load-bearing
  # one for the CDC dashboard is `gnatsd_consumer_num_pending` —
  # JetStream messages waiting on the API's durable consumers.
  nats-exporter:
    image: ${NATS_EXPORTER_IMAGE:-natsio/prometheus-nats-exporter:0.14.0}
    profiles: [ "observability" ]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    command: [ "-varz", "-jsz=all", "-connz", "http://nats:8222" ]
    ports:
      - "7777:7777"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:7777/metrics | grep -q '^gnatsd_varz_' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # Debezium Server reads INSERTs to outbox_events from the Postgres WAL and
  # republishes each row to NATS, with the topic pulled directly from the
  # row's `subject` column and the message body taken verbatim from `payload`.
  # Profile-gated: `make dev-up` does NOT start Debezium; bring it up with
  # `docker compose --profile debezium up`. The intent is to validate the CDC
  # path end-to-end before the app-side cutover (Slice B) flips the publisher
  # driver away from the in-process worker.
  #
  # Important: while this profile is active alongside the in-process publisher,
  # every outbox row gets published TWICE to NATS (once by each path). The
  # realtime client UI keys on message UUID and is robust to dupes, but this
  # is not the production end-state — see ADR-0018 for the cutover plan.
  debezium:
    image: ${DEBEZIUM_IMAGE:-debezium/server:3.0.0.Final}
    profiles: [ "debezium" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./debezium:/debezium/config:ro
      - debezium-data:/debezium/data
    healthcheck:
      # Debezium Server's actuator-style endpoint at :8080/q/health returns
      # 200 once the source connector has attached its replication slot.
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/q/health | grep -q '\"status\":\"UP\"' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  postgres-data:
  valkey-data:
  nats-data:
  opensearch-data:
  debezium-data:
  otel-lgtm-data:
