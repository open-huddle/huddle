version: v2
# clean: true would wipe gen/go and gen/ts, including the go.mod / package.json
# that sit alongside generated code. Leaving it off — if a proto is removed,
# manually delete the orphaned output.
plugins:
  # Go — protobuf message types
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  # Go — Connect handlers & clients
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # TypeScript — protobuf messages *and* service descriptors (Connect-ES v2 reads
  # the service descriptor from the *_pb.ts file, so no separate Connect plugin).
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts
