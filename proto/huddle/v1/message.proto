syntax = "proto3";

package huddle.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/open-huddle/huddle/gen/go/huddle/v1;huddlev1";

// MessageService handles message send and read for chat channels. Realtime
// delivery (WebSocket push) is intentionally out of scope here — clients
// poll List for now; Phase 2c adds the streaming surface.
service MessageService {
  // Send a message to a channel. Caller must be a member of the channel's
  // organization.
  rpc Send(MessageServiceSendRequest) returns (MessageServiceSendResponse) {}

  // List messages in a channel, newest first. Cursor-paginated: callers pass
  // the next_cursor from a previous response to fetch older messages.
  rpc List(MessageServiceListRequest) returns (MessageServiceListResponse) {}

  // Subscribe streams new messages in a channel as they are sent. The stream
  // starts at "now" — older messages are fetched via List on reconnect.
  // Closing the call (client disconnect or context cancel) cleans up the
  // server-side subscription. The token is verified once at stream open;
  // long-lived clients should reconnect periodically with a fresh token.
  //
  // Subscribe pushes message.created events only in this revision. Edits
  // and deletes land via List refetch today; a future "realtime v2" PR
  // will extend the streaming shape.
  rpc Subscribe(MessageServiceSubscribeRequest) returns (stream MessageServiceSubscribeResponse) {}

  // Edit replaces the body and mention set of a message the caller
  // authored. Non-authors cannot edit. edited_at on the returned Message
  // stamps each successful edit. Fires a message.edited outbox event;
  // notifications for newly-added mentions are in-app only (the mailer
  // skips edit-sourced notifications).
  rpc Edit(MessageServiceEditRequest) returns (MessageServiceEditResponse) {}

  // Delete soft-deletes a message. The author, an organization admin,
  // or an owner may delete. Deleted messages disappear from List but
  // the row stays in the DB for audit. Fires a message.deleted outbox
  // event; the search indexer removes the doc; the notifications
  // consumer stamps and moves on (existing notifications survive).
  rpc Delete(MessageServiceDeleteRequest) returns (MessageServiceDeleteResponse) {}
}

message Message {
  string id = 1;
  string channel_id = 2;
  string author_id = 3;
  // Markdown text. Server treats as opaque; clients render. Max 8 KiB.
  // Format is intentionally not parameterised — there is no body_format
  // enum. If a future variant is needed it will land as a separate field.
  string body = 4;
  google.protobuf.Timestamp created_at = 5;
  // User IDs explicitly mentioned by the sender. Populated from the
  // message_mentions join table on reads; these are the users the
  // notifications consumer will fan out Notification rows for. Server
  // enforces that every id is a member of the channel's organization;
  // self-mentions are silently dropped. See ADR-0005 for why mentions
  // are a separate field rather than parsed out of `body`.
  repeated string mention_user_ids = 6;
  // Set on each successful Edit. Empty for un-edited messages. Clients
  // can show "edited" affordances when this is present and differs from
  // created_at.
  google.protobuf.Timestamp edited_at = 7;
}

message MessageServiceSendRequest {
  string channel_id = 1;
  string body = 2;
  // Explicit @-mentions. Server validates + de-duplicates + drops
  // self-mentions. Providing a non-member id returns InvalidArgument.
  repeated string mention_user_ids = 3;
}
message MessageServiceSendResponse {
  Message message = 1;
}

message MessageServiceListRequest {
  string channel_id = 1;
  // Opaque cursor returned by a previous List call. Empty means start from
  // the newest message. Cursors encode (created_at, id) of the boundary
  // row; do not parse or construct them on the client.
  string before = 2;
  // Page size. Defaults to 50 when zero or negative; clamped to 200 max.
  int32 limit = 3;
}
message MessageServiceListResponse {
  // Newest first.
  repeated Message messages = 1;
  // Pass to a subsequent List call to fetch older messages. Empty when no
  // more pages exist.
  string next_cursor = 2;
}

message MessageServiceSubscribeRequest {
  string channel_id = 1;
}
// Wrapping the streamed Message lets us add future fields (event type,
// heartbeat, tombstone) without a breaking wire change.
message MessageServiceSubscribeResponse {
  Message message = 1;
}

message MessageServiceEditRequest {
  string id = 1;
  string body = 2;
  // Full replacement set — not a diff. Validated + deduped on the
  // server same as Send. Omitting the field clears all mentions.
  repeated string mention_user_ids = 3;
}
message MessageServiceEditResponse {
  Message message = 1;
}

message MessageServiceDeleteRequest {
  string id = 1;
}
message MessageServiceDeleteResponse {}
