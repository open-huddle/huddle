version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - prealloc
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
      # revive's exported / package-comments rules want a doc comment on every
      # exported identifier. Useful on a library, noisy on an internal app —
      # we rely on identifier names + package READMEs instead. Other revive
      # rules (blank-imports, error-strings, unused-parameter, ...) stay on.
      - linters:
          - revive
        text: "should have comment( or be unexported)?|package-comments"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/open-huddle/huddle
